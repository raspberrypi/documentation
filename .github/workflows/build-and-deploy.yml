name: Build and deploy

on:
  workflow_call:
    inputs:
      environment:
        type: string
      url:
        type: string
      deploy:
        type: boolean
        default: false

jobs:
  build:
    runs-on: [self-hosted, web]
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          submodules: recursive
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: 3.9
      - name: Install Python dependencies
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install -r ./requirements.txt
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9
        with:
          ruby-version: 3.2
          bundler-cache: true
      - name: Install Ninja
        run: pip3 install ninja==1.10.2.4
      - name: Install arm-none-eabi-gcc GNU Arm Embedded Toolchain
        if: ${{ inputs.deploy }}
        uses: carlosperate/arm-none-eabi-gcc-action@98c40e51546516419841748d3210c290df0d2c6c
      - name: Install Doxygen
        if: ${{ inputs.deploy }}
        run: |
          wget https://www.doxygen.nl/files/doxygen-1.10.0.linux.bin.tar.gz
          if echo 'dcfc9aa4cc05aef1f0407817612ad9e9201d9bf2ce67cecf95a024bba7d39747  doxygen-1.10.0.linux.bin.tar.gz' | sha256sum --check --status
          then
            tar xf doxygen-1.10.0.linux.bin.tar.gz -C "$HOME"
            echo "$HOME/doxygen-1.10.0/bin" >> $GITHUB_PATH
          fi
      - name: Build Doxygen documentation
        if: ${{ inputs.deploy }}
        run: make build_doxygen_adoc
      - name: Build documentation
        run: make -j 2
      - name: Deploy to Mythic Beasts
        if: ${{ inputs.deploy }}
        uses: ./.github/actions/deploy-action
        with:
          private_ssh_key: ${{ secrets.DEPLOY_SSH_KEY }}
          bastion_host: ${{ secrets.DEPLOY_BASTION_HOST }}
          primary_host: ${{ secrets.DEPLOY_PRIMARY_HOST }}
          secondary_host: ${{ secrets.DEPLOY_SECONDARY_HOST }}
          source: documentation/html/
          destination: documentation
